name: ai_companions_flutter
description: AI Companions Flutter Application - Feature-for-feature migration from React Native
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Routing
  go_router: ^17.3.0

  # JSON Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.2.3

  # UI Components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # Forms
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Utils
  logger: ^2.3.0
  flutter_dotenv: ^6.0.1

  # Localization
  easy_localization: ^3.0.7

  # Images & Media
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^12.0.3

  # Notifications
  flutter_local_notifications: ^22.0.1

  # Audio
  audioplayers: ^6.0.0

  # Supabase
  supabase_flutter: ^2.5.6

  # UI Helpers
  shimmer: ^3.0.0
  flutter_slidable: ^4.0.3
  pull_to_refresh: ^2.0.0

  # File System
  path_provider: ^2.1.3

  # URL Launcher
  url_launcher: ^6.3.0

  # Connectivity
  connectivity_plus: ^7.2.0

  # Device Info
  device_info_plus: ^13.2.0

  # Package Info
  package_info_plus: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  freezed: ^3.2.3
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - assets/translations/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
